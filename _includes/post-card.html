<a class="card" href="{{ include.post.url | relative_url }}">
  <div class="meta">
    {{ include.post.date | date: "%B %-d, %Y" }}{% if include.post.categories and include.post.categories.size > 0 %} · {{ include.post.categories | join: ", " }}{% endif %}
  </div>
  <h2>{{ include.post.title }}</h2>
  <div>{{ include.post.summary }}</div>
</a>
