---
layout: default
---
<article class="post">
  <div class="meta">
    {{ page.date | date: "%B %-d, %Y" }}{% if page.categories and page.categories.size > 0 %} · {{ page.categories | join: ", " }}{% endif %}
  </div>
  <h1>{{ page.title }}</h1>
  <div class="content">
    {{ content }}
  </div>
</article>
